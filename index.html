<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ortam SPZ Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: rgba(18, 21, 25, 0.78);
        --panel-strong: rgba(18, 21, 25, 0.92);
        --text: #f3f5f7;
        --muted: #a8b0b8;
        --line: rgba(255, 255, 255, 0.13);
        --accent: #7dd3fc;
        --accent-strong: #2dd4bf;
        --danger: #fb7185;
        --shadow: rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 12%, rgba(125, 211, 252, 0.16), transparent 26rem),
          radial-gradient(circle at 88% 18%, rgba(45, 212, 191, 0.12), transparent 24rem),
          linear-gradient(135deg, #090b0e 0%, #101418 48%, #07090c 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      select {
        font: inherit;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        z-index: 2;
        left: clamp(12px, 2vw, 22px);
        top: clamp(12px, 2vw, 22px);
        width: min(360px, calc(100vw - 24px));
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 50px var(--shadow);
        backdrop-filter: blur(16px);
      }

      .hud-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .badge {
        flex: 0 0 auto;
        padding: 4px 8px;
        border: 1px solid rgba(125, 211, 252, 0.35);
        border-radius: 999px;
        color: #d9f6ff;
        background: rgba(125, 211, 252, 0.12);
        font-size: 12px;
        font-weight: 500;
      }

      .meta {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .meta strong {
        color: var(--text);
        font-weight: 500;
      }

      .progress {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-strong));
        transition: width 180ms ease;
      }

      .message {
        min-height: 18px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .message.error {
        color: var(--danger);
      }

      .toolbar {
        position: fixed;
        z-index: 2;
        left: 50%;
        bottom: clamp(12px, 2vw, 22px);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: min(760px, calc(100vw - 24px));
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        box-shadow: 0 18px 50px var(--shadow);
        transform: translateX(-50%);
        backdrop-filter: blur(16px);
      }

      .tool-button,
      .tool-select {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
      }

      .tool-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        cursor: pointer;
      }

      .tool-button:hover,
      .tool-select:hover {
        border-color: rgba(125, 211, 252, 0.44);
        background: rgba(255, 255, 255, 0.11);
      }

      .tool-button[aria-pressed="true"] {
        border-color: rgba(45, 212, 191, 0.72);
        background: rgba(45, 212, 191, 0.18);
      }

      .tool-select {
        max-width: 220px;
        padding: 0 34px 0 10px;
      }

      .hint {
        width: 100%;
        color: var(--muted);
        text-align: center;
        font-size: 12px;
      }

      @media (max-width: 560px) {
        .hud {
          right: 12px;
          width: auto;
        }

        .toolbar {
          justify-content: stretch;
        }

        .tool-button,
        .tool-select {
          flex: 1 1 136px;
          justify-content: center;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="app" aria-label="Ortam SPZ 3D görüntüleyici">
      <section class="hud" aria-live="polite">
        <div class="hud-title">
          <h1>ortam.spz</h1>
          <span class="badge">SPZ</span>
        </div>
        <div class="meta">
          <div>Dosya: <strong id="file-size">66.1 MB</strong></div>
          <div>Durum: <strong id="status">Başlatılıyor</strong></div>
        </div>
        <div class="progress" aria-label="Yükleme ilerlemesi">
          <div class="bar" id="progress-bar"></div>
        </div>
        <div class="message" id="message">3D ortam yükleniyor...</div>
      </section>

      <div class="toolbar" aria-label="Görüntüleme kontrolleri">
        <button class="tool-button" type="button" id="reset-view">Görünümü Sıfırla</button>
        <button class="tool-button" type="button" id="auto-rotate" aria-pressed="false">Otomatik Döndür</button>
        <button class="tool-button" type="button" id="toggle-grid" aria-pressed="true">Izgara</button>
        <select class="tool-select" id="orientation" aria-label="Model yönü">
          <option value="normal">Yön: Normal</option>
          <option value="x180">Yön: X 180°</option>
          <option value="y180">Yön: Y 180°</option>
          <option value="z180">Yön: Z 180°</option>
        </select>
        <div class="hint">Sürükle: döndür · Tekerlek: yakınlaştır · Sağ tık: kaydır</div>
      </div>
    </main>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

      const SPLAT_URL = "./ortam.spz";
      const KNOWN_FILE_SIZE = 66070391;

      const app = document.getElementById("app");
      const statusEl = document.getElementById("status");
      const messageEl = document.getElementById("message");
      const progressBar = document.getElementById("progress-bar");
      const fileSizeEl = document.getElementById("file-size");
      const resetButton = document.getElementById("reset-view");
      const rotateButton = document.getElementById("auto-rotate");
      const gridButton = document.getElementById("toggle-grid");
      const orientationSelect = document.getElementById("orientation");

      let splat = null;
      let autoRotate = false;
      let lastFrameTime = performance.now();

      fileSizeEl.textContent = formatBytes(KNOWN_FILE_SIZE);

      const scene = new THREE.Scene();
      scene.background = null;

      const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.01, 5000);
      camera.position.set(0, 1.35, 4.2);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        powerPreference: "high-performance"
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      app.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.target.set(0, 0, 0);
      controls.update();

      const spark = new SparkRenderer({ renderer });
      scene.add(spark);

      const grid = new THREE.GridHelper(6, 24, 0x7dd3fc, 0x334155);
      grid.material.transparent = true;
      grid.material.opacity = 0.26;
      grid.position.y = -0.02;
      scene.add(grid);

      const axes = new THREE.AxesHelper(1.2);
      axes.position.set(-2.6, 0, -2.6);
      scene.add(axes);

      resetButton.addEventListener("click", resetView);
      rotateButton.addEventListener("click", () => {
        autoRotate = !autoRotate;
        rotateButton.setAttribute("aria-pressed", String(autoRotate));
      });
      gridButton.addEventListener("click", () => {
        grid.visible = !grid.visible;
        axes.visible = grid.visible;
        gridButton.setAttribute("aria-pressed", String(grid.visible));
      });
      orientationSelect.addEventListener("change", applyOrientation);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      loadSplat();

      renderer.setAnimationLoop((time) => {
        const delta = Math.min((time - lastFrameTime) / 1000, 0.05);
        lastFrameTime = time;

        if (autoRotate && splat) {
          splat.rotation.y += delta * 0.32;
        }

        controls.update();
        renderer.render(scene, camera);
      });

      async function loadSplat() {
        setStatus("Yükleniyor", "SPZ dosyası tarayıcıya aktarılıyor...");

        try {
          splat = new SplatMesh({
            url: SPLAT_URL,
            fileName: "ortam.spz",
            onProgress: (event) => {
              const total = event.total || KNOWN_FILE_SIZE;
              if (total) {
                const loaded = Math.min(event.loaded || 0, total);
                setProgress((loaded / total) * 100);
                setStatus("Yükleniyor", `${formatBytes(loaded)} / ${formatBytes(total)}`);
              }
            },
            onLoad: (mesh) => {
              setProgress(100);
              setStatus("Hazır", `${formatNumber(mesh.numSplats || 0)} splat görüntüleniyor.`);
            }
          });

          scene.add(splat);
          await splat.initialized;
          applyOrientation();
          frameSplat(splat);
        } catch (error) {
          console.error(error);
          messageEl.classList.add("error");
          setStatus("Hata", "SPZ dosyası yüklenemedi. Uygulamayı bir yerel sunucudan açtığından emin ol.");
        }
      }

      function frameSplat(mesh) {
        let box;
        try {
          box = mesh.getBoundingBox(true);
        } catch {
          resetView();
          return;
        }

        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const radius = Math.max(size.x, size.y, size.z, 0.1) * 0.5;
        const distance = radius / Math.sin(THREE.MathUtils.degToRad(camera.fov * 0.5));

        controls.target.copy(center);
        camera.near = Math.max(distance / 1000, 0.01);
        camera.far = Math.max(distance * 20, 100);
        camera.position.copy(center).add(new THREE.Vector3(distance * 0.58, distance * 0.38, distance * 1.25));
        camera.updateProjectionMatrix();
        controls.update();

        grid.position.set(center.x, box.min.y, center.z);
        grid.scale.setScalar(Math.max(radius / 3, 1));
        axes.position.set(box.min.x, box.min.y, box.min.z);
      }

      function resetView() {
        if (splat?.isInitialized) {
          frameSplat(splat);
          return;
        }

        controls.target.set(0, 0, 0);
        camera.position.set(0, 1.35, 4.2);
        controls.update();
      }

      function applyOrientation() {
        if (!splat) {
          return;
        }

        splat.rotation.set(0, 0, 0);
        if (orientationSelect.value === "x180") splat.rotation.x = Math.PI;
        if (orientationSelect.value === "y180") splat.rotation.y = Math.PI;
        if (orientationSelect.value === "z180") splat.rotation.z = Math.PI;
        splat.updateMatrixWorld(true);

        if (splat.isInitialized) {
          frameSplat(splat);
        }
      }

      function setStatus(status, message) {
        statusEl.textContent = status;
        messageEl.textContent = message;
      }

      function setProgress(value) {
        progressBar.style.width = `${Math.max(0, Math.min(value, 100)).toFixed(1)}%`;
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        const value = bytes / Math.pow(1024, index);
        return `${value.toFixed(index === 0 ? 0 : 1)} ${units[index]}`;
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("tr-TR").format(value);
      }
    </script>
  </body>
</html>
