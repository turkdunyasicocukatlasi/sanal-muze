<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ortam Panorama Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(17, 20, 24, 0.78);
        --panel-strong: rgba(17, 20, 24, 0.9);
        --text: #f6f7f9;
        --muted: #aab2bc;
        --line: rgba(255, 255, 255, 0.15);
        --accent: #38bdf8;
        --active: #14b8a6;
        --danger: #fb7185;
        --shadow: rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05070a;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      canvas.is-dragging {
        cursor: grabbing;
      }

      .hud {
        position: fixed;
        z-index: 2;
        left: clamp(12px, 2vw, 22px);
        top: clamp(12px, 2vw, 22px);
        width: min(360px, calc(100vw - 24px));
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 50px var(--shadow);
        backdrop-filter: blur(16px);
      }

      .hud-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .badge {
        flex: 0 0 auto;
        padding: 4px 8px;
        border: 1px solid rgba(56, 189, 248, 0.38);
        border-radius: 999px;
        color: #dff7ff;
        background: rgba(56, 189, 248, 0.13);
        font-size: 12px;
        font-weight: 500;
      }

      .meta {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .meta strong {
        color: var(--text);
        font-weight: 500;
      }

      .progress {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      .bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--active));
        transition: width 180ms ease;
      }

      .message {
        min-height: 18px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .message.error {
        color: var(--danger);
      }

      .toolbar {
        position: fixed;
        z-index: 2;
        left: 50%;
        bottom: clamp(12px, 2vw, 22px);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: min(820px, calc(100vw - 24px));
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        box-shadow: 0 18px 50px var(--shadow);
        transform: translateX(-50%);
        backdrop-filter: blur(16px);
      }

      .tool-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        gap: 8px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
        cursor: pointer;
      }

      .tool-button:hover,
      .zoom-control:hover {
        border-color: rgba(56, 189, 248, 0.44);
        background: rgba(255, 255, 255, 0.11);
      }

      .tool-button[aria-pressed="true"] {
        border-color: rgba(20, 184, 166, 0.74);
        background: rgba(20, 184, 166, 0.18);
      }

      .zoom-control {
        display: flex;
        align-items: center;
        min-height: 38px;
        gap: 9px;
        padding: 0 11px;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
      }

      .zoom-control label,
      .zoom-control output {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .zoom-control input {
        width: 144px;
        accent-color: var(--active);
      }

      .hint {
        width: 100%;
        color: var(--muted);
        text-align: center;
        font-size: 12px;
      }

      @media (max-width: 640px) {
        .hud {
          right: 12px;
          width: auto;
        }

        .toolbar {
          justify-content: stretch;
        }

        .tool-button,
        .zoom-control {
          flex: 1 1 144px;
        }

        .zoom-control {
          justify-content: center;
        }

        .zoom-control input {
          width: min(34vw, 132px);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="app" aria-label="Ortam PNG 360 panorama viewer">
      <section class="hud" aria-live="polite">
        <div class="hud-title">
          <h1>ortam.png</h1>
          <span class="badge">360 PNG</span>
        </div>
        <div class="meta">
          <div>Gorsel: <strong>3840 x 1920</strong></div>
          <div>Durum: <strong id="status">Baslatiliyor</strong></div>
        </div>
        <div class="progress" aria-label="Yukleme ilerlemesi">
          <div class="bar" id="progress-bar"></div>
        </div>
        <div class="message" id="message">Panorama yukleniyor...</div>
      </section>

      <div class="toolbar" aria-label="Gezinme kontrolleri">
        <button class="tool-button" type="button" id="reset-view">Gorunumu Sifirla</button>
        <button class="tool-button" type="button" id="auto-rotate" aria-pressed="false">Otomatik Don</button>
        <button class="tool-button" type="button" id="fullscreen">Tam Ekran</button>
        <div class="zoom-control">
          <label for="zoom">Zoom</label>
          <input id="zoom" type="range" min="35" max="90" value="75" step="1">
          <output id="zoom-value" for="zoom">75</output>
        </div>
        <div class="hint">Surukle: etrafa bak · Tekerlek: zoom · Ok tuslari: don</div>
      </div>
    </main>

    <script type="module">
      import * as THREE from "three";

      const IMAGE_URL = "./ortam.png";
      const IMAGE_SIZE = 12162577;

      const app = document.getElementById("app");
      const statusEl = document.getElementById("status");
      const messageEl = document.getElementById("message");
      const progressBar = document.getElementById("progress-bar");
      const resetButton = document.getElementById("reset-view");
      const rotateButton = document.getElementById("auto-rotate");
      const fullscreenButton = document.getElementById("fullscreen");
      const zoomInput = document.getElementById("zoom");
      const zoomValue = document.getElementById("zoom-value");

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        powerPreference: "high-performance"
      });

      let lon = 0;
      let lat = 0;
      let phi = 0;
      let theta = 0;
      let isDragging = false;
      let pointerX = 0;
      let pointerY = 0;
      let pointerLon = 0;
      let pointerLat = 0;
      let autoRotate = false;
      let loaded = false;
      let lastFrameTime = performance.now();

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      app.appendChild(renderer.domElement);

      const geometry = new THREE.SphereGeometry(500, 96, 48);
      geometry.scale(-1, 1, 1);

      const material = new THREE.MeshBasicMaterial({ color: 0x222831 });
      const panorama = new THREE.Mesh(geometry, material);
      scene.add(panorama);

      loadTexture();
      bindEvents();

      renderer.setAnimationLoop((time) => {
        const delta = Math.min((time - lastFrameTime) / 1000, 0.05);
        lastFrameTime = time;

        if (autoRotate && !isDragging) {
          lon += delta * 4.5;
        }

        updateCamera();
        renderer.render(scene, camera);
      });

      function loadTexture() {
        setStatus("Yukleniyor", "Panorama dosyasi tarayiciya aktariliyor...");

        new THREE.TextureLoader().load(
          IMAGE_URL,
          (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
            material.map = texture;
            material.color.set(0xffffff);
            material.needsUpdate = true;
            loaded = true;
            setProgress(100);
            setStatus("Hazir", "360 panorama gezilebilir.");
          },
          (event) => {
            const total = event.total || IMAGE_SIZE;
            const value = total ? Math.min(event.loaded / total, 1) * 100 : 35;
            setProgress(value);
            setStatus("Yukleniyor", `${formatBytes(event.loaded)} / ${formatBytes(total)}`);
          },
          (error) => {
            console.error(error);
            messageEl.classList.add("error");
            setStatus("Hata", "ortam.png yuklenemedi. Dosya index.html ile ayni klasorde olmali.");
          }
        );
      }

      function bindEvents() {
        renderer.domElement.addEventListener("pointerdown", (event) => {
          isDragging = true;
          pointerX = event.clientX;
          pointerY = event.clientY;
          pointerLon = lon;
          pointerLat = lat;
          renderer.domElement.classList.add("is-dragging");
          renderer.domElement.setPointerCapture(event.pointerId);
        });

        renderer.domElement.addEventListener("pointermove", (event) => {
          if (!isDragging) {
            return;
          }

          lon = pointerLon - (event.clientX - pointerX) * 0.1;
          lat = pointerLat + (event.clientY - pointerY) * 0.1;
        });

        renderer.domElement.addEventListener("pointerup", (event) => {
          isDragging = false;
          renderer.domElement.classList.remove("is-dragging");
          renderer.domElement.releasePointerCapture(event.pointerId);
        });

        renderer.domElement.addEventListener("pointercancel", () => {
          isDragging = false;
          renderer.domElement.classList.remove("is-dragging");
        });

        renderer.domElement.addEventListener("wheel", (event) => {
          event.preventDefault();
          const nextFov = THREE.MathUtils.clamp(camera.fov + event.deltaY * 0.035, 35, 90);
          setZoom(nextFov);
        }, { passive: false });

        window.addEventListener("keydown", (event) => {
          if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") lon -= 3;
          if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") lon += 3;
          if (event.key === "ArrowUp" || event.key.toLowerCase() === "w") lat += 3;
          if (event.key === "ArrowDown" || event.key.toLowerCase() === "s") lat -= 3;
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        resetButton.addEventListener("click", resetView);

        rotateButton.addEventListener("click", () => {
          autoRotate = !autoRotate;
          rotateButton.setAttribute("aria-pressed", String(autoRotate));
        });

        fullscreenButton.addEventListener("click", async () => {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        });

        zoomInput.addEventListener("input", () => {
          setZoom(Number(zoomInput.value));
        });
      }

      function updateCamera() {
        lat = Math.max(-85, Math.min(85, lat));
        phi = THREE.MathUtils.degToRad(90 - lat);
        theta = THREE.MathUtils.degToRad(lon);

        const x = 500 * Math.sin(phi) * Math.cos(theta);
        const y = 500 * Math.cos(phi);
        const z = 500 * Math.sin(phi) * Math.sin(theta);
        camera.lookAt(x, y, z);

        if (loaded) {
          messageEl.textContent = `Aci: ${Math.round(((lon % 360) + 360) % 360)} derece · Zoom: ${Math.round(camera.fov)}`;
        }
      }

      function resetView() {
        lon = 0;
        lat = 0;
        setZoom(75);
      }

      function setZoom(value) {
        camera.fov = THREE.MathUtils.clamp(value, 35, 90);
        camera.updateProjectionMatrix();
        zoomInput.value = String(Math.round(camera.fov));
        zoomValue.textContent = String(Math.round(camera.fov));
      }

      function setStatus(status, message) {
        statusEl.textContent = status;
        messageEl.textContent = message;
      }

      function setProgress(value) {
        progressBar.style.width = `${Math.max(0, Math.min(value, 100)).toFixed(1)}%`;
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        const value = bytes / Math.pow(1024, index);
        return `${value.toFixed(index === 0 ? 0 : 1)} ${units[index]}`;
      }
    </script>
  </body>
</html>
